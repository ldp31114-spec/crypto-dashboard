<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoSMC Dashboard</title>
<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#090b11;color:#e8eaf0;font-family:system-ui,sans-serif;min-height:100vh}
.header{background:rgba(255,255,255,0.03);border-bottom:1px solid rgba(255,255,255,0.06);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.logo{display:flex;align-items:center;gap:8px}
.logo-icon{width:28px;height:28px;background:linear-gradient(135deg,#00e5a0,#0066ff);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px}
.logo-text{font-weight:700;font-size:16px}
.live-badge{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:600}
.container{padding:16px;max-width:1200px;margin:0 auto}
.price-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
@media(max-width:700px){.price-grid{grid-template-columns:1fr 1fr}}
.price-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:12px;cursor:pointer;transition:all 0.2s}
.price-card:hover,.price-card.active{background:rgba(0,229,160,0.07);border-color:rgba(0,184,122,0.4)}
.coin-sym{font-size:10px;color:#5a6070;letter-spacing:1px;margin-bottom:3px}
.coin-name{font-size:9px;color:#3a4055;margin-bottom:5px}
.coin-price{font-size:17px;font-weight:700;font-family:monospace;margin-bottom:6px}
.coin-change{font-size:12px;font-weight:600;padding:2px 6px;border-radius:4px;display:inline-block}
.pos{color:#00b87a;background:rgba(0,184,122,0.1)}
.neg{color:#ef5350;background:rgba(239,83,80,0.1)}
.card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:14px;margin-bottom:12px}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid rgba(255,255,255,0.05);margin:-14px -14px 14px}
.card-title{font-size:13px;font-weight:600}
.tf-btns{display:flex;gap:4px}
.tf-btn{background:rgba(255,255,255,0.05);border:none;border-radius:6px;color:#8b8fa8;padding:4px 10px;font-size:10px;cursor:pointer;transition:all 0.2s}
.tf-btn.active{background:rgba(0,184,122,0.2);color:#00b87a}
#chart-container{height:260px}
.detail-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.detail-price{font-size:28px;font-weight:800;font-family:monospace}
.detail-change{text-align:right;padding:8px 14px;border-radius:10px}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
.stat-box{background:rgba(255,255,255,0.03);border-radius:8px;padding:8px 10px}
.stat-label{font-size:9px;color:#3a4055;margin-bottom:3px}
.stat-val{font-size:12px;font-weight:600;font-family:monospace}
.smc-section{border-top:1px solid rgba(255,255,255,0.05);padding-top:10px}
.smc-label{font-size:9px;color:#5a6070;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.smc-badges{display:flex;gap:5px;flex-wrap:wrap}
.sbadge{border-radius:6px;padding:3px 9px;font-size:10px;font-weight:600}
.ai-btn{background:linear-gradient(135deg,#00e5a0,#0066ff);border:none;border-radius:8px;color:#fff;padding:6px 16px;font-size:11px;font-weight:700;cursor:pointer;transition:opacity 0.2s}
.ai-btn:disabled{opacity:0.6}
.ai-body{padding:14px;min-height:80px}
.ai-empty{text-align:center;color:#3a4055;padding:20px 0;font-size:13px}
.ai-text{font-size:12px;line-height:1.8;color:#c8cad8;white-space:pre-wrap}
.dot{width:6px;height:6px;border-radius:50%;background:#00b87a;display:inline-block;animation:bou 1s ease-in-out infinite;margin:0 2px}
.dot:nth-child(2){animation-delay:.15s}.dot:nth-child(3){animation-delay:.3s}
@keyframes bou{0%,80%,100%{transform:scale(.7);opacity:.4}40%{transform:scale(1);opacity:1}}
.sent-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.sent-sym{width:36px;font-size:10px;color:#5a6070;font-family:monospace}
.sent-bg{flex:1;height:5px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden}
.sent-bar{height:100%;border-radius:3px;transition:width .8s ease}
.sent-val{width:54px;font-size:10px;font-weight:600;text-align:right;font-family:monospace}
.disc{font-size:9px;color:#2a3045;text-align:center;line-height:1.5;padding:12px}
.loading-box{display:flex;align-items:center;justify-content:center;padding:30px;color:#3a4055;font-size:13px}
</style>
</head>
<body>
<div class="header">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <span class="logo-text">CryptoSMC</span>
    <span class="live-badge" id="live-badge" style="background:rgba(255,165,0,0.15);color:#ffa500">連接中...</span>
  </div>
  <span style="font-size:10px;color:#3a4055" id="update-time"></span>
</div>
<div class="container">
  <div class="price-grid" id="price-grid">
    <div class="loading-box" style="grid-column:1/-1">載入幣價中...</div>
  </div>

  <div class="card" id="detail-card">
    <div class="loading-box">點選上方幣種查看詳情</div>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="card-title" id="chart-title">BTC/USDT K線圖</span>
      <div class="tf-btns">
        <button class="tf-btn active" onclick="changeTF(this,'1m')">1m</button>
        <button class="tf-btn" onclick="changeTF(this,'5m')">5m</button>
        <button class="tf-btn" onclick="changeTF(this,'15m')">15m</button>
        <button class="tf-btn" onclick="changeTF(this,'1h')">1H</button>
        <button class="tf-btn" onclick="changeTF(this,'4h')">4H</button>
      </div>
    </div>
    <div id="chart-container"></div>
  </div>

  <div class="card">
    <div class="card-header">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="width:22px;height:22px;background:linear-gradient(135deg,#00e5a0,#0066ff);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px">✦</span>
        <span class="card-title">AI 市場分析</span>
      </div>
      <button class="ai-btn" id="ai-btn" onclick="runAI()">分析 BTC</button>
    </div>
    <div class="ai-body" id="ai-body">
      <div class="ai-empty">✦<br><br>選擇幣種後點「分析」獲取 AI 洞察</div>
    </div>
  </div>

  <div class="card">
    <div style="font-size:10px;color:#5a6070;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px">24小時市場情緒</div>
    <div id="sentiment-bars"><div class="loading-box">載入中...</div></div>
  </div>

  <div class="disc">⚠️ 僅供學習參考，不構成投資建議。加密貨幣具高風險，請自行評估。</div>
</div>

<script>
// 設定全新的 Render 後端網址
const BACKEND_URL = 'https://my-crypto-radar-kskd.onrender.com';

const COINS=[
  {id:'bitcoin',  sym:'BTC',name:'Bitcoin', binance:'BTCUSDT'},
  {id:'ethereum', sym:'ETH',name:'Ethereum',binance:'ETHUSDT'},
  {id:'solana',   sym:'SOL',name:'Solana',  binance:'SOLUSDT'},
  {id:'sui',      sym:'SUI',name:'Sui',     binance:'SUIUSDT'},
];

let prices={};
let selected=COINS[0];
let aiLoading=false;
let chart=null;
let candleSeries=null;
let currentTF='1m';
let klineWS=null;

function fmt(n,d=2){
  if(n==null||isNaN(n))return'---';
  return parseFloat(n).toLocaleString(undefined,{maximumFractionDigits:d});
}

// 幣價改向全新的 Render 後端獲取
async function fetchPrices(){
  try{
    const r=await fetch(`${BACKEND_URL}/api/prices?ids=bitcoin,ethereum,solana,sui`);
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    let ok=false;
    COINS.forEach(c=>{
      if(d[c.id]&&d[c.id].usd){
        prices[c.id]={
          usd:d[c.id].usd,
          ch24:d[c.id].usd_24h_change||0,
          ch7:d[c.id].usd_7d_change||0,
        };
        ok=true;
      }
    });
    if(ok){
      renderCards();
      renderDetail();
      renderSentiment();
      const badge=document.getElementById('live-badge');
      badge.textContent='LIVE';
      badge.style.background='rgba(0,229,160,0.15)';
      badge.style.color='#00b87a';
      document.getElementById('update-time').textContent=
        '更新 '+new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    }
  }catch(e){
    console.error('fetchPrices error:',e);
    document.getElementById('live-badge').textContent='重連中';
  }
}

// K線改向全新的 Render 後端獲取
async function loadKlines(){
  const sym={bitcoin:'BTCUSDT',ethereum:'ETHUSDT',solana:'SOLUSDT',sui:'SUIUSDT'}[selected.id];
  try{
    const r=await fetch(`${BACKEND_URL}/api/klines?symbol=${sym}&interval=${currentTF}&limit=200`);
    if(!r.ok)throw new Error('HTTP '+r.status);
    const data=await r.json();
    if(!Array.isArray(data))return;
    const candles=data.map(k=>({time:Math.floor(k[0]/1000),open:+k[1],high:+k[2],low:+k[3],close:+k[4]}));
    if(candleSeries&&candles.length)candleSeries.setData(candles);
  }catch(e){console.error('loadKlines error:',e);}
}

// Binance WebSocket 即時K線
function connectKline(){
  const sym=selected.binance.toLowerCase();
  if(klineWS){try{klineWS.close();}catch(e){}klineWS=null;}
  try{
    klineWS=new WebSocket(`wss://stream.binance.com:9443/ws/${sym}@kline_${currentTF}`);
    klineWS.onmessage=e=>{
      const k=JSON.parse(e.data).k;
      if(candleSeries&&k)candleSeries.update({time:Math.floor(k.t/1000),open:+k.o,high:+k.h,low:+k.l,close:+k.c});
    };
    klineWS.onerror=()=>{};
  }catch(e){}
}

function initChart(){
  const el=document.getElementById('chart-container');
  el.innerHTML='';
  chart=LightweightCharts.createChart(el,{
    width:el.clientWidth,height:260,
    layout:{background:{color:'transparent'},textColor:'#5a6070'},
    grid:{vertLines:{color:'rgba(255,255,255,0.03)'},horzLines:{color:'rgba(255,255,255,0.03)'}},
    rightPriceScale:{borderColor:'rgba(255,255,255,0.08)'},
    timeScale:{borderColor:'rgba(255,255,255,0.08)',timeVisible:true,secondsVisible:false},
  });
  candleSeries=chart.addCandlestickSeries({
    upColor:'#00e5a0',downColor:'#ef5350',
    borderUpColor:'#00e5a0',borderDownColor:'#ef5350',
    wickUpColor:'#00e5a0',wickDownColor:'#ef5350',
  });
  window.addEventListener('resize',()=>{if(chart)chart.applyOptions({width:el.clientWidth});});
}

function changeTF(btn,tf){
  currentTF=tf;
  document.querySelectorAll('.tf-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  loadKlines();
  connectKline();
}

function renderCards(){
  document.getElementById('price-grid').innerHTML=COINS.map(c=>{
    const d=prices[c.id]||{};
    const ch=d.ch24||0;
    const pos=ch>=0;
    const isSel=selected.id===c.id;
    return `<div class="price-card${isSel?' active':''}" onclick="selectCoin('${c.id}')">
      <div class="coin-sym">${c.sym}</div>
      <div class="coin-name">${c.name}</div>
      <div class="coin-price">$${fmt(d.usd)}</div>
      <span class="coin-change ${pos?'pos':'neg'}">${pos?'▲':'▼'} ${fmt(Math.abs(ch))}%</span>
    </div>`;
  }).join('');
}

function renderDetail(){
  const d=prices[selected.id];
  if(!d){return;}
  const pos24=d.ch24>=0;
  const pos7=(d.ch7||0)>=0;

  document.getElementById('detail-card').innerHTML=`
    <div class="card-header">
      <div>
        <div style="font-size:11px;color:#5a6070;margin-bottom:3px">${selected.name} / USDT</div>
        <div class="detail-price">$${fmt(d.usd)}</div>
      </div>
      <div class="detail-change" style="background:${pos24?'rgba(0,229,160,0.1)':'rgba(239,83,80,0.1)'};border:1px solid ${pos24?'rgba(0,184,122,0.25)':'rgba(239,83,80,0.25)'}">
        <div style="font-size:18px;font-weight:700;color:${pos24?'#00b87a':'#ef5350'}">${pos24?'+':''}${fmt(d.ch24)}%</div>
        <div style="font-size:9px;color:#3a4055;margin-top:2px">24小時漲跌</div>
      </div>
    </div>
    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-label">7日漲跌</div>
        <div class="stat-val" style="color:${pos7?'#00b87a':'#ef5350'}">${pos7?'+':''}${fmt(d.ch7||0)}%</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">幣種</div>
        <div class="stat-val">${selected.sym}/USDT</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">方向</div>
        <div class="stat-val" style="color:${pos24?'#00b87a':'#ef5350'}">${pos24?'上漲':'下跌'}</div>
      </div>
    </div>
  `;
  document.getElementById('chart-title').textContent=selected.sym+'/USDT K線圖';
  document.getElementById('ai-btn').textContent='分析 '+selected.sym;
}

function renderSentiment(){
  document.getElementById('sentiment-bars').innerHTML=COINS.map(c=>{
    const d=prices[c.id]||{};
    const ch=d.ch24||0;
    const pct=Math.min(Math.abs(ch)/10*100,100);
    const col=ch>=0?'#00b87a':'#ef5350';
    return `<div class="sent-row">
      <div class="sent-sym">${c.sym}</div>
      <div class="sent-bg"><div class="sent-bar" style="width:${pct.toFixed(1)}%;background:${col}"></div></div>
      <div class="sent-val" style="color:${col}">${ch>=0?'+':''}${fmt(ch)}%</div>
    </div>`;
  }).join('');
}

function selectCoin(id){
  selected=COINS.find(c=>c.id===id);
  renderCards();
  renderDetail();
  loadKlines();
  connectKline();
  document.getElementById('ai-body').innerHTML=
    `<div class="ai-empty">✦<br><br>點「分析 ${selected.sym}」獲取 AI 洞察</div>`;
}

async function runAI(){
  if(aiLoading)return;
  aiLoading=true;
  const btn=document.getElementById('ai-btn');
  btn.disabled=true;btn.textContent='分析中...';
  const body=document.getElementById('ai-body');
  body.innerHTML=`<div style="text-align:center;padding:24px">
    <div><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
    <div style="margin-top:12px;font-size:11px;color:#5a6070">AI 正在分析市場結構...</div>
  </div>`;

  const d=prices[selected.id]||{};
  const prompt=`你是SMC加密貨幣分析師，請用繁體中文分析：
幣種：${selected.name}（${selected.sym}）
現價：$${fmt(d.usd)}
24H漲跌：${fmt(d.ch24)}%
7D漲跌：${fmt(d.ch7||0)}%

請給出：
1. 市場結構分析（2句）
2. 關鍵支撐與阻力位
3. 操作建議（看多/看空/觀望）及理由
4. 風險提示（1句）`;

  const KEY=window.ANTHROPIC_KEY||'';
  if(!KEY||KEY.includes('填入')){
    body.innerHTML=`<div class="ai-text" style="color:#5a6070;text-align:center">請在 index.html 最後設定 API Key：\n\nwindow.ANTHROPIC_KEY='sk-ant-你的Key'</div>`;
    btn.disabled=false;btn.textContent='分析 '+selected.sym;aiLoading=false;return;
  }

  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':KEY,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:700,
        messages:[{role:'user',content:prompt}]
      })
    });
    const data=await r.json();
    const text=data.content?.map(b=>b.text).join('')||'分析失敗，請重試';
    body.innerHTML=`<div class="ai-text">${text}</div>`;
  }catch(e){
    body.innerHTML=`<div class="ai-text" style="color:#5a6070;text-align:center">連線失敗，請稍後再試</div>`;
  }
  btn.disabled=false;btn.textContent='分析 '+selected.sym;aiLoading=false;
}

// ★ 填入你的 Anthropic API Key（從 console.anthropic.com 取得）
window.ANTHROPIC_KEY='sk-ant-在這裡填入你的Key';

initChart();
fetchPrices();
setInterval(fetchPrices,30000);
loadKlines();
connectKline();
</script>
</body>
</html>
